name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FLUTTER_VERSION: '3.35.1'

jobs:
  # ─── 静态分析 + 单元测试（轻量、所有 PR 必跑） ────────────────────
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run unit tests
        run: flutter test test/core test/models test/services
        # 排除 widget tests（依赖资源/字体，CI 渲染不稳）

      - name: catch(_) 棘轮门禁（只许降不许升）
        # 历轮（10-12）catch(_) 反复反弹。此门禁锁死上限：
        # 新代码引入 catch(_) 使总数超过 tool/catch_underscore_ceiling.txt 即失败。
        # 清理后请同步下调天花板文件，棘轮单向收紧。
        run: |
          ceiling=$(tr -d '[:space:]' < tool/catch_underscore_ceiling.txt)
          # { grep || true; } 同 withOpacity 门禁：防 catch(_) 清到 0 时 grep 退出 1
          # 在 pipefail+set -e 下让赋值 abort，导致干净树假失败。
          actual=$( { grep -rn 'catch (_)' lib --include='*.dart' || true; } | wc -l | tr -d '[:space:]')
          echo "catch(_) 实际=$actual 上限=$ceiling"
          if [ "$actual" -gt "$ceiling" ]; then
            echo "::error::catch(_) 数量 $actual 超过上限 $ceiling。请用 swallow/swallowDebug 替代新引入的 catch(_)。"
            exit 1
          fi
          if [ "$actual" -lt "$ceiling" ]; then
            echo "::warning::catch(_) 已降到 $actual（上限 $ceiling）。请把 tool/catch_underscore_ceiling.txt 下调到 $actual 以收紧棘轮。"
          fi

      - name: withOpacity 零容忍门禁（CLAUDE.md 规则5）
        # 第十二轮鸿蒙补丁 ohos_patch.ps1 把 ~1246 处 withValues 误降级成已废弃的
        # withOpacity 并提交进 master（commit 944b452d7），analyze 从 583 飙到 2462。
        # 项目规范要求一律用 .withValues(alpha:)。此门禁锁死 lib/ 内 .withOpacity( = 0，
        # 防鸿蒙补丁态误提交重演（与本地 pre-commit guard 互为第二道网）。
        run: |
          # grep 无匹配时退出码 1；GitHub Actions 默认 shell 带 pipefail+set -e，
          # 会让 actual=$(...) 赋值在 echo 前就 abort。本门禁期望 0 匹配（成功态），
          # 必须用 { grep || true; } 吞掉 grep 的"无匹配=1"，否则干净树反而假失败、阻塞合并。
          actual=$( { grep -rho '\.withOpacity(' lib --include='*.dart' || true; } | wc -l | tr -d '[:space:]')
          echo ".withOpacity( 在 lib/ 出现 $actual 处（应为 0）"
          if [ "$actual" -gt 0 ]; then
            echo "::error::lib/ 内出现 $actual 处 .withOpacity( —— 应为 .withValues(alpha:)。疑似鸿蒙构建补丁态（ohos_patch.ps1）误提交，请跑 ohos_restore.ps1 还原。"
            grep -rn '\.withOpacity(' lib --include='*.dart' | head -20
            exit 1
          fi

  # ─── 多端构建（push 到 master 时跑，PR 不跑） ────────────────────
  build-web:
    name: Build Web
    if: github.event_name == 'push'
    needs: analyze-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build web with /mad-kgdt/ base
        run: flutter build web --release --base-href "/mad-kgdt/"
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 14

  build-android:
    name: Build Android APK
    if: github.event_name == 'push'
    needs: analyze-test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-windows:
    name: Build Windows
    if: github.event_name == 'push'
    needs: analyze-test
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      # ANGLE / libmpv 通过 ghfast 镜像下载需要事先准备；CI 走原始 GitHub URL 应该 OK
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          retention-days: 14

  build-ios:
    name: Build iOS IPA
    if: github.event_name == 'push'
    needs: analyze-test
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # sqflite_common_ffi 依赖 sqlite3 原生库，iOS 构建需要 sqlite3_flutter_libs
      - run: flutter pub get

      # 无签名构建（仅验证编译通过；需 Apple 开发者证书才能真机安装）
      # 若需正式分发，增加证书导入步骤后再构建签名 IPA
      - name: Build unsigned IPA
        run: flutter build ipa --release --no-codesign

      - name: Package IPA from archive
        run: |
          mkdir -p build/ios/ipa
          cp -R "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" "build/ios/ipa/Payload"
          (cd build/ios/ipa && zip -r -q "Runner.ipa" "Payload" && rm -rf "Payload")
          VERSION=$(sed -n 's/^version: *\([0-9.]*\)+.*/\1/p' pubspec.yaml)
          echo "Version: ${VERSION}"
          cp "build/ios/ipa/Runner.ipa" "build/ios/ipa/移动图谱与数字孪生+ios+v${VERSION}-unsigned.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            build/ios/ipa/移动图谱与数字孪生+ios+*.ipa
            build/ios/ipa/Runner.ipa
          retention-days: 14

  # ─── 自动部署 web 到 gh-pages（仅 master push） ──────────────────
  deploy-web:
    name: Deploy Web to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true
          cname: false
          commit_message: 'deploy: web auto from GitHub Actions'
