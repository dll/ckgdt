<!doctype html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',sans-serif;
  color:#EAF2FF;background:#0A1428;}
.stage{position:relative;width:1920px;height:1080px;
  background:
    radial-gradient(1100px 700px at 78% 12%, rgba(34,211,238,0.10), transparent 60%),
    radial-gradient(900px 700px at 12% 92%, rgba(56,189,248,0.08), transparent 60%),
    linear-gradient(135deg,#070D1B 0%,#0A1428 45%,#0E1C38 100%);
  overflow:hidden;}
.grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(120,170,230,0.16) 1px,transparent 1px),
    linear-gradient(90deg,rgba(120,170,230,0.16) 1px,transparent 1px);
  background-size:60px 60px;opacity:.55;}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(
  0deg,transparent 0 3px,rgba(0,0,0,0.10) 3px 4px);opacity:.25;}
.corner{position:absolute;width:54px;height:54px;border:2px solid #22D3EE;opacity:.5;}
.corner.tl{top:40px;left:40px;border-right:none;border-bottom:none;}
.corner.tr{top:40px;right:40px;border-left:none;border-bottom:none;}
.corner.bl{bottom:40px;left:40px;border-right:none;border-top:none;}
.corner.br{bottom:40px;right:40px;border-left:none;border-top:none;}
.head{position:absolute;top:54px;left:96px;right:96px;display:flex;
  align-items:center;justify-content:space-between;z-index:5;}
.kicker{display:flex;align-items:center;gap:18px;}
.kdot{width:13px;height:13px;border-radius:50%;background:#22D3EE;
  box-shadow:0 0 16px #22D3EE;}
.ktext{font-size:23px;letter-spacing:6px;color:#22D3EE;font-weight:700;}
.kid{font-size:19px;letter-spacing:3px;color:#5C7290;font-family:Consolas,monospace;}
.title{position:absolute;left:96px;top:118px;z-index:5;}
.title h1{font-size:60px;font-weight:800;letter-spacing:2px;line-height:1.15;}
.title .bar{width:120px;height:6px;margin-top:24px;border-radius:3px;
  background:linear-gradient(90deg,#22D3EE,#38BDF8);box-shadow:0 0 22px rgba(34,211,238,.6);}
.foot{position:absolute;bottom:50px;left:96px;right:96px;display:flex;
  justify-content:space-between;align-items:center;color:#5C7290;
  font-size:19px;letter-spacing:2px;z-index:5;}
.foot .fr{font-family:Consolas,monospace;}
.accent{color:#22D3EE;} .amber{color:#FBBF24;}
.green{color:#34D399;} .red{color:#F8717A;}

.ar{position:absolute;top:308px;left:96px;right:96px;display:flex;
  flex-direction:column;gap:26px;z-index:5;}
.ar-layer{position:relative;border-radius:18px;padding:34px 42px;display:flex;
  align-items:center;gap:40px;overflow:hidden;
  background:linear-gradient(160deg,#101F3D,rgba(14,28,56,.55));
  border:1px solid #1B3258;box-shadow:0 14px 36px rgba(0,0,0,.3);}
.ar-num{flex:none;width:80px;height:80px;border-radius:18px;display:flex;
  align-items:center;justify-content:center;font-size:40px;font-weight:900;
  font-family:Consolas,monospace;}
.ar-mid{flex:1;}
.ar-mid h3{font-size:32px;font-weight:800;margin-bottom:8px;}
.ar-mid p{font-size:20px;color:#8FA8C8;line-height:1.5;}
.ar-side{flex:none;text-align:right;}
.ar-side .cyc{font-size:30px;font-weight:900;font-family:Consolas,monospace;}
.ar-side .who{font-size:18px;color:#5C7290;margin-top:6px;}
.ar-conn{position:absolute;left:136px;width:3px;background:rgba(34,211,238,.4);z-index:4;}
</style></head><body>
<div class="stage"><div class="grid"></div><div class="scan"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="head"><div class="kicker">
      <div class="kdot"></div><div class="ktext">系统建模 · 分层组织架构</div></div>
      <div class="kid">MAD-FORM · 07 / 19</div></div><div class="title"><h1>三层编队组织架构 · 纵向解耦</h1><div class="bar"></div></div><div class="ar"><div class="ar-layer">
          <div class="ar-num" style="background:rgba(34,211,238,.1);color:#22D3EE;border:1px solid #22D3EE">01</div>
          <div class="ar-mid"><h3>任务决策层 · DECISION</h3><p>任务分配 · 目标指派 · 优先级排序</p></div>
          <div class="ar-side"><div class="cyc" style="color:#22D3EE">秒级~分钟级</div>
          <div class="who">有人机 / 地面站</div></div></div><div class="ar-layer">
          <div class="ar-num" style="background:rgba(34,211,238,.1);color:#FBBF24;border:1px solid #FBBF24">02</div>
          <div class="ar-mid"><h3>编队规划层 · PLANNING</h3><p>队形生成 · 重构规划 · 速度剖面协调</p></div>
          <div class="ar-side"><div class="cyc" style="color:#FBBF24">百毫秒~秒级</div>
          <div class="who">编队长机</div></div></div><div class="ar-layer">
          <div class="ar-num" style="background:rgba(34,211,238,.1);color:#34D399;border:1px solid #34D399">03</div>
          <div class="ar-mid"><h3>轨迹控制层 · CONTROL</h3><p>位置保持 · 速度跟踪 · 实时扰动补偿</p></div>
          <div class="ar-side"><div class="cyc" style="color:#34D399">毫秒级</div>
          <div class="who">各机飞控</div></div></div></div><div class="foot"><div>刘 畅 · 无人机运用与指挥</div>
      <div class="fr">面向异构飞行器协同作战的编队策略研究</div></div>
</div></body></html>
