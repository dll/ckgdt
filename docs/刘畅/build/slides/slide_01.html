<!doctype html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',sans-serif;
  color:#EAF2FF;background:#0A1428;}
.stage{position:relative;width:1920px;height:1080px;
  background:
    radial-gradient(1100px 700px at 78% 12%, rgba(34,211,238,0.10), transparent 60%),
    radial-gradient(900px 700px at 12% 92%, rgba(56,189,248,0.08), transparent 60%),
    linear-gradient(135deg,#070D1B 0%,#0A1428 45%,#0E1C38 100%);
  overflow:hidden;}
.grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(120,170,230,0.16) 1px,transparent 1px),
    linear-gradient(90deg,rgba(120,170,230,0.16) 1px,transparent 1px);
  background-size:60px 60px;opacity:.55;}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(
  0deg,transparent 0 3px,rgba(0,0,0,0.10) 3px 4px);opacity:.25;}
.corner{position:absolute;width:54px;height:54px;border:2px solid #22D3EE;opacity:.5;}
.corner.tl{top:40px;left:40px;border-right:none;border-bottom:none;}
.corner.tr{top:40px;right:40px;border-left:none;border-bottom:none;}
.corner.bl{bottom:40px;left:40px;border-right:none;border-top:none;}
.corner.br{bottom:40px;right:40px;border-left:none;border-top:none;}
.head{position:absolute;top:54px;left:96px;right:96px;display:flex;
  align-items:center;justify-content:space-between;z-index:5;}
.kicker{display:flex;align-items:center;gap:18px;}
.kdot{width:13px;height:13px;border-radius:50%;background:#22D3EE;
  box-shadow:0 0 16px #22D3EE;}
.ktext{font-size:23px;letter-spacing:6px;color:#22D3EE;font-weight:700;}
.kid{font-size:19px;letter-spacing:3px;color:#5C7290;font-family:Consolas,monospace;}
.title{position:absolute;left:96px;top:118px;z-index:5;}
.title h1{font-size:60px;font-weight:800;letter-spacing:2px;line-height:1.15;}
.title .bar{width:120px;height:6px;margin-top:24px;border-radius:3px;
  background:linear-gradient(90deg,#22D3EE,#38BDF8);box-shadow:0 0 22px rgba(34,211,238,.6);}
.foot{position:absolute;bottom:50px;left:96px;right:96px;display:flex;
  justify-content:space-between;align-items:center;color:#5C7290;
  font-size:19px;letter-spacing:2px;z-index:5;}
.foot .fr{font-family:Consolas,monospace;}
.accent{color:#22D3EE;} .amber{color:#FBBF24;}
.green{color:#34D399;} .red{color:#F8717A;}

.cv-mark{position:absolute;top:148px;left:96px;display:flex;align-items:center;gap:24px;z-index:6;}
.cv-em{width:80px;height:80px;border:3px solid #22D3EE;border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative;
  box-shadow:0 0 26px rgba(34,211,238,.5);}
.cv-em::before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;
  background:#22D3EE;box-shadow:0 0 16px #22D3EE;}
.cv-em::after{content:'';position:absolute;width:124px;height:124px;border-radius:50%;
  border:1px solid rgba(34,211,238,.28);}
.cv-org{font-size:26px;letter-spacing:5px;color:#CFE8FF;font-weight:700;}
.cv-sub{font-size:17px;letter-spacing:3px;color:#5C7290;margin-top:8px;font-family:Consolas,monospace;}
.cv-band{position:absolute;top:308px;left:98px;font-size:22px;letter-spacing:10px;
  color:#22D3EE;font-weight:700;}
.cv-title{position:absolute;top:362px;left:96px;right:520px;z-index:6;}
.cv-title h1{font-size:82px;font-weight:900;line-height:1.2;letter-spacing:2px;
  background:linear-gradient(90deg,#EAF2FF 35%,#22D3EE);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;}
.cv-rule{width:210px;height:7px;margin-top:36px;border-radius:4px;
  background:linear-gradient(90deg,#22D3EE,transparent);box-shadow:0 0 24px rgba(34,211,238,.6);}
.cv-meta{position:absolute;bottom:148px;left:96px;display:grid;
  grid-template-columns:repeat(2,auto);gap:20px 90px;z-index:6;}
.cv-meta .row{display:flex;align-items:center;gap:18px;}
.cv-meta .lab{font-size:21px;color:#5C7290;letter-spacing:4px;min-width:100px;}
.cv-meta .val{font-size:25px;color:#CFE8FF;font-weight:700;letter-spacing:2px;}
.cv-radar{position:absolute;right:120px;top:336px;width:500px;height:500px;opacity:.55;}
.cv-radar .ring{position:absolute;border:1px solid rgba(34,211,238,.32);border-radius:50%;}
.cv-radar .sweep{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg, rgba(34,211,238,.22), transparent 28%);}
.cv-radar .dot{position:absolute;width:12px;height:12px;border-radius:50%;
  background:#FBBF24;box-shadow:0 0 14px #FBBF24;}
.cv-date{position:absolute;bottom:150px;right:96px;font-size:23px;color:#22D3EE;
  letter-spacing:4px;font-weight:700;text-align:right;}
</style></head><body>
<div class="stage"><div class="grid"></div><div class="scan"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="cv-radar"><div class="sweep"></div><div class="ring" style="inset:0px;"></div><div class="ring" style="inset:62px;"></div><div class="ring" style="inset:124px;"></div><div class="ring" style="inset:186px;"></div>
      <div class="ring" style="inset:0;border-color:rgba(34,211,238,.5);"></div>
      <div class="dot" style="top:30%;left:62%;"></div>
      <div class="dot" style="top:58%;left:40%;background:#22D3EE;box-shadow:0 0 14px #22D3EE;"></div>
      <div class="dot" style="top:70%;left:66%;background:#34D399;box-shadow:0 0 14px #34D399;"></div></div>
    <div class="cv-mark"><div class="cv-em"></div>
      <div><div class="cv-org">空军航空大学 · 航空作战勤务学院</div>
      <div class="cv-sub">HETEROGENEOUS AIRCRAFT · COOPERATIVE FORMATION</div></div></div>
    <div class="cv-band">本科毕业设计（论文）· 答辩汇报</div>
    <div class="cv-title"><h1>面向异构飞行器协同作战的编队策略研究</h1><div class="cv-rule"></div></div>
    <div class="cv-meta">
      <div class="row"><div class="lab">汇 报 人</div><div class="val">刘 畅</div></div>
      <div class="row"><div class="lab">指导教员</div><div class="val">何 维</div></div>
      <div class="row"><div class="lab">专　　业</div><div class="val">无人机运用与指挥</div></div>
      <div class="row"><div class="lab">期　　班</div><div class="val">无人机 64201 期班</div></div></div><div class="cv-date">二〇二六年六月</div><div class="foot"><div>刘 畅 · 无人机运用与指挥</div>
      <div class="fr">面向异构飞行器协同作战的编队策略研究</div></div>
</div></body></html>
