# HarmonyOS 端 dependency 覆盖（pubspec_overrides 模式）
#
# **作用**：build_ohos.bat 把本文件 cp 到 pubspec_overrides.yaml，
# pub get 自动覆盖主 pubspec 的依赖版本。构建结束后删除恢复。
#
# **重要**：本脚本是独占的 — 跑 build_ohos.bat 时不要同时 build android/windows/web，
# 因为 pubspec_overrides.yaml 在 cwd 时 dart pub 会全局加载，污染所有平台 pub get。
#
# **背景**：flutter_ohos 锁 Dart SDK 3.4，多个新版包需要 Dart 3.5+ 或 3.7+。
# 这里把不兼容的包降到 Dart 3.4 兼容版本：

dependency_overrides:
  # 33.x 系列要 Dart 3.7+，用 24-29 范围（PDF 提取功能完整保留）
  syncfusion_flutter_pdf: ">=20.0.0 <30.0.0"
  # 10.x 系列要 Dart 3.5+，用 8.x（教学场景文件选择器够用）
  file_picker: "^8.3.2"
  # 5.5.5+ 要 Dart 3.5+，锁到 5.5.4
  win32: "<=5.5.4"
  # 1.3.x 用了 PopScope.onPopInvokedWithResult（Flutter 3.27+），降到 1.2.x
  media_kit_video: "<=1.2.5"
  # 0.10.x+ 要 Dart 3.6+，降到 0.9.x（OHOS SDK Dart 3.4 兼容）
  camera: "<0.10.0"
  # camera_android_camerax 0.6.30+ 要 Dart 3.6+
  camera_android_camerax: "<0.6.30"
  # camera_avfoundation 0.9.19+3 要 Dart 3.6+，锁到 0.9.19 (sdk ^3.4.0)
  camera_avfoundation: "0.9.19"
  # mobile_scanner 5.2.3+ 可能用到新 API
  mobile_scanner: "<5.2.0"
  # shared_preferences 2.3.3+ 要 Dart 3.6+
  shared_preferences: "<2.3.0"
  # path_provider 2.1.5+ 要 Dart 3.6+
  path_provider: "<2.1.4"
  # package_info_plus 8.3.1 要 Dart 3.6+
  package_info_plus: "<8.3.0"
  # webview_flutter 4.x 要 Dart 3.5+
  webview_flutter: "<=3.0.4"
  # webview_flutter_android 4.x 要 Dart 3.5+ (transitive dep)
  webview_flutter_android: "<=3.16.0"
  # webview_flutter_wkwebview 3.x 要 Dart 3.5+ (transitive dep)
  webview_flutter_wkwebview: "<=3.9.4"
